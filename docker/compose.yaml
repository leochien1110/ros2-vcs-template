    build:
      context: .
      dockerfile: Dockerfile.ros-cuda
      args:
        CUDA_IMAGE: nvidia/cuda:13.3.0-devel-ubuntu24.04
        ROS_DISTRO: jazzy
    image: ros2-workspace:jazzy-cuda13-arm64
    platform: linux/arm64
